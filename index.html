<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetSorted — We Know Their Hand.</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0B1F3A;
  --orange:#E8640C;
  --white:#F8F7F4;
  --gray:#8a9ab0;
  --max:1140px;
  --gutter:40px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Barlow,sans-serif;
  background:var(--white);
  color:#1a2e47;
}

/* GLOBAL ALIGNMENT SYSTEM */
.container{
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--gutter);
}

/* HEADER */
header{
  position:sticky;
  top:0;
  height:68px;
  background:var(--navy);
  display:flex;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header img{height:120px}

nav a{
  color:var(--gray);
  text-decoration:none;
  font-size:12px;
  margin-left:24px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* HERO */
.hero{
  background:var(--navy);
  min-height:calc(100vh - 68px);
  display:grid;
  grid-template-columns:1fr 1fr;
}

.hero-left{
  display:flex;
  align-items:center;
}

.hero-content{
  padding:80px 0;
}

.hero h1{
  font-size:clamp(60px,8vw,110px);
  line-height:.9;
  color:var(--white);
  font-family:Impact,Arial Narrow,sans-serif;
  margin-bottom:20px;
}

.hero h1 span{color:var(--orange)}

.hero p{
  color:var(--gray);
  margin-bottom:24px;
  max-width:420px;
}

/* BUTTONS */
.btn{
  display:inline-block;
  padding:14px 28px;
  font-weight:700;
  text-transform:uppercase;
  font-size:13px;
  letter-spacing:1px;
  text-decoration:none;
}

.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{border:1px solid var(--gray);color:var(--gray);margin-left:10px}

/* SECTIONS */
section{
  padding:100px 0;
}

h2{
  font-size:48px;
  font-family:Impact;
  line-height:1;
  margin-bottom:16px;
}

/* SIMPLE GRID */
.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}

.card{
  background:#fff;
  padding:24px;
  border:1px solid #e5e5e5;
}

/* FOOTER */
footer{
  background:var(--navy);
  color:var(--gray);
  padding:60px 0;
}

.footer-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:40px;
}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr}
  nav{display:none}
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="container header-inner">
    <img src="images/sorted_logo.png" alt="GetSorted">

    <nav>
      <a href="#how">How It Works</a>
      <a href="#services">Services</a>
      <a href="#guide">Guide</a>
      <a href="#about">About</a>
      <a href="#contact" style="color:#fff">Book</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <div class="container hero-content">
      <h1>
        You're<br>
        playing a<br>
        <span>rigged</span><br>
        game.
      </h1>

      <p>
        The car buying process is designed against you. We level it.
      </p>

      <a class="btn btn-primary" href="#contact">Book Call</a>
      <a class="btn btn-secondary" href="#guide">Free Guide</a>
    </div>
  </div>

  <div></div>
</section>

<!-- SAMPLE SECTION -->
<section>
  <div class="container">
    <h2>How It Works</h2>

    <div class="grid-3">
      <div class="card">Step 1</div>
      <div class="card">Step 2</div>
      <div class="card">Step 3</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container footer-grid">
    <div>
      <img src="images/sorted_logo.png" style="height:40px">
      <p>Car buying concierge.</p>
    </div>
    <div>Services</div>
    <div>Company</div>
    <div>Contact</div>
  </div>
</footer>

</body>
</html>
